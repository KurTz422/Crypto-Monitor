name: Crypto Monitor CI/CD Test

# Запускаем робота каждый раз, когда ты делаешь git push в ветку main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Используем свежий Linux от GitHub

    steps:
      # 1. Робот скачивает твой код из репозитория
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Робот собирает Docker-образ по твоему Dockerfile
      - name: Build Docker image
        run: docker build -t crypto-monitor:test .

      # 3. Робот запускает контейнер, ждет 15 секунд и показывает логи
      - name: Run Monitor and Show Results
        run: |
          echo "Starting container in background..."
          docker run -d --name monitor-run -e EXCHANGES="binance.com,google.com,okx.com" -e CHECK_INTERVAL=2 crypto-monitor:test
          
          echo "Waiting 15 seconds for logs to accumulate..."
          sleep 15
          
          echo "--- LOGS FROM CONTAINER ---"
          docker logs monitor-run
          echo "--- END OF LOGS ---"

      # 4. Очистка (хороший тон в DevOps)
      - name: Cleanup
        run: docker rm -f monitor-run
